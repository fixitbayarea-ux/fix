# ══════════════════════════════════════════════════════════

# ── 1. HTTPS enforcement ──
[[redirects]]
  from = "http://fixitbay.net/*"
  to = "https://fixitbay.net/:splat"
  status = 301
  force = true

# ── 2. www → non-www ──
