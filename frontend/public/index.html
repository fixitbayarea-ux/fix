  <!-- LocalBusiness schema dedup: hides global schema when page injects its own -->
  <script>
  (function () {

    function dedupLocalBusiness() {
      var globalLB = document.getElementById('global-localbusiness-schema');
      if (!globalLB) return;
      var allLD = document.querySelectorAll('script[type="application/ld+json"]');
      var pageHasOwn = false;
      for (var i = 0; i < allLD.length; i++) {
        if (allLD[i].id === 'global-localbusiness-schema') continue;
        try { if (JSON.parse(allLD[i].textContent)['@type'] === 'LocalBusiness') { pageHasOwn = true; break; } } catch(e) {}
      }
      globalLB.type = pageHasOwn ? 'application/json' : 'application/ld+json';
    }
    var _ps = history.pushState, _rs = history.replaceState;
    history.pushState = function(){ var r=_ps.apply(this,arguments); setTimeout(dedupLocalBusiness,800); return r; };
    history.replaceState = function(){ var r=_rs.apply(this,arguments); setTimeout(dedupLocalBusiness,800); return r; };
    window.addEventListener('popstate', function(){ setTimeout(dedupLocalBusiness,800); });
    window.addEventListener('load', function(){ setTimeout(dedupLocalBusiness,800); setTimeout(dedupLocalBusiness,2000); });
  })();
  </script>

  <script>
    (function(){
      var isLocal = ['localhost','127.0.0.1'].includes(location.hostname);
      if (isLocal) {
        console.log('[QA] redirects: disabled on localhost');
        return;
      }

      function redirect(to){ location.replace(to); }
      var path = location.pathname;
      if(path === '/appliance-replacement'){
        redirect('/appliance-repair');
        return;
      }
      if(location.protocol==='http:'){
        if(location.host.startsWith('www.')){
          redirect('https://' + location.host.replace(/^www\./,'') + location.pathname + location.search + location.hash);
        } else {
          redirect('https://' + location.host + location.pathname + location.search + location.hash);
        }
      } else if(location.host.startsWith('www.')){
        redirect('https://' + location.host.replace(/^www\./,'') + location.pathname + location.search + location.hash);
      }
      console.log('[QA] redirects: enforced (http→https, www→root)');
    })();
  </script>
